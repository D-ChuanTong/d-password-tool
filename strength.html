<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码强度检测器 - 免费在线密码安全检测工具</title>
    <meta name="description" content="免费在线密码强度检测器，实时评估密码安全性，提供修改建议，保护你的账号安全。">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- 标题 -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">🛡️ 密码强度检测器</h1>
            <p class="text-slate-400 text-sm">实时评估你的密码安全性</p>
        </div>

        <!-- 主卡片 -->
        <div class="bg-white rounded-2xl shadow-2xl p-6 space-y-6">

            <!-- 密码输入框 -->
            <div class="relative">
                <input type="text" id="password-input" placeholder="在此输入或粘贴你的密码..." 
                    class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl p-4 pr-12 text-lg font-mono text-slate-800 focus:outline-none focus:border-indigo-500 transition-colors">
                <!-- 切换明文/密文按钮 -->
                <button onclick="toggleVisibility()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600 transition-colors" title="显示/隐藏密码">
                    <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </button>
            </div>

            <!-- 强度进度条 -->
            <div>
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-medium text-slate-700">安全等级</span>
                    <span id="strength-label" class="text-sm font-bold text-slate-400">未检测</span>
                </div>
                <div class="w-full bg-slate-200 rounded-full h-3">
                    <div id="strength-bar" class="h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <!-- 破解时间预估 -->
            <div id="crack-time-container" class="hidden bg-slate-50 rounded-xl p-4 text-center fade-in">
                <p class="text-xs text-slate-500 mb-1">暴力破解预估时间</p>
                <p id="crack-time" class="text-xl font-bold text-slate-800">-</p>
            </div>

            <!-- 优化建议列表 -->
            <div id="suggestions-container" class="space-y-2 fade-in">
                <!-- JS 会动态生成建议项 -->
            </div>

        </div>

        <!-- 底部导航：返回生成器
        <div class="text-center mt-6">
            <a href="index.html" class="inline-flex items-center text-slate-400 hover:text-white text-sm transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                返回密码生成器
            </a>
        </div> -->
        <div class="text-center mt-8 flex justify-center gap-4 text-sm text-slate-500">
            <a href="index.html" class="hover:text-indigo-400">← 生成随机密码</a>
            <span>|</span>
            <a href="passphrase.html" class="hover:text-indigo-400">生成密码短语 →</a>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password-input');
        const strengthBar = document.getElementById('strength-bar');
        const strengthLabel = document.getElementById('strength-label');
        const crackTimeContainer = document.getElementById('crack-time-container');
        const crackTimeText = document.getElementById('crack-time');
        const suggestionsContainer = document.getElementById('suggestions-container');
        let isVisible = false;

        // 切换密码可见性
        function toggleVisibility() {
            isVisible = !isVisible;
            passwordInput.type = isVisible ? 'text' : 'password';
        }

        // 监听输入，实时检测
        passwordInput.addEventListener('input', () => {
            const pwd = passwordInput.value;
            if (!pwd) {
                resetUI();
                return;
            }
            evaluatePassword(pwd);
        });

        function resetUI() {
            strengthBar.style.width = '0%';
            strengthBar.className = 'h-3 rounded-full transition-all duration-300 bg-slate-200';
            strengthLabel.textContent = '未检测';
            strengthLabel.className = 'text-sm font-bold text-slate-400';
            crackTimeContainer.classList.add('hidden');
            suggestionsContainer.innerHTML = '';
        }

        function evaluatePassword(pwd) {
            let score = 0;
            let suggestions = [];

            // 1. 长度检测
            if (pwd.length >= 8) score++;
            else suggestions.push('长度不足 8 位，建议增加长度');

            if (pwd.length >= 12) score++;
            if (pwd.length < 6) suggestions.push('密码太短，极易被破解');

            // 2. 字符类型检测
            if (/[a-z]/.test(pwd)) score++;
            else suggestions.push('建议添加小写字母 (a-z)');

            if (/[A-Z]/.test(pwd)) score++;
            else suggestions.push('建议添加大写字母 (A-Z)');

            if (/\d/.test(pwd)) score++;
            else suggestions.push('建议添加数字 (0-9)');

            if (/[^a-zA-Z0-9]/.test(pwd)) score++;
            else suggestions.push('建议添加特殊符号 (!@#$%)');

            // 3. 常见弱密码检测
            const weakPatterns = ['123456', 'password', 'qwerty', 'admin', '111111', 'abc123'];
            if (weakPatterns.some(p => pwd.toLowerCase().includes(p))) {
                score = 0;
                suggestions = ['⚠️ 包含常见弱密码特征，极度危险！'];
            }

            // 更新 UI
            updateUI(score, suggestions, pwd);
        }

        function updateUI(score, suggestions, pwd) {
            // 配置等级
            const levels = [
                { width: '15%', color: 'bg-red-500', text: '极度危险', textColor: 'text-red-500' },
                { width: '30%', color: 'bg-orange-500', text: '弱', textColor: 'text-orange-500' },
                { width: '50%', color: 'bg-yellow-500', text: '一般', textColor: 'text-yellow-600' },
                { width: '75%', color: 'bg-lime-500', text: '较强', textColor: 'text-lime-600' },
                { width: '90%', color: 'bg-green-500', text: '强', textColor: 'text-green-600' },
                { width: '100%', color: 'bg-emerald-600', text: '非常强', textColor: 'text-emerald-600' }
            ];

            const level = levels[Math.min(score, levels.length - 1)];
            
            // 更新进度条
            strengthBar.style.width = level.width;
            strengthBar.className = `h-3 rounded-full transition-all duration-300 ${level.color}`;
            
            // 更新文字
            strengthLabel.textContent = level.text;
            strengthLabel.className = `text-sm font-bold ${level.textColor}`;

            // 显示破解时间
            crackTimeContainer.classList.remove('hidden');
            crackTimeText.textContent = estimateCrackTime(pwd);

            // 生成建议列表
            suggestionsContainer.innerHTML = '';
            if (suggestions.length > 0) {
                suggestions.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'flex items-start text-sm text-slate-600 fade-in';
                    div.innerHTML = `<span class="text-yellow-500 mr-2 mt-0.5">💡</span><span>${msg}</span>`;
                    suggestionsContainer.appendChild(div);
                });
            } else {
                const div = document.createElement('div');
                div.className = 'flex items-start text-sm text-emerald-600 fade-in';
                div.innerHTML = `<span class="mr-2 mt-0.5">✅</span><span>非常完美！这是一个极其安全的密码。</span>`;
                suggestionsContainer.appendChild(div);
            }
        }

        // 简单的破解时间预估逻辑
        function estimateCrackTime(pwd) {
            let charsetSize = 0;
            if (/[a-z]/.test(pwd)) charsetSize += 26;
            if (/[A-Z]/.test(pwd)) charsetSize += 26;
            if (/\d/.test(pwd)) charsetSize += 10;
            if (/[^a-zA-Z0-9]/.test(pwd)) charsetSize += 33;
            
            if (charsetSize === 0) return '瞬间';

            // 假设攻击者每秒尝试 100亿次 (10^10)
            const combinations = Math.pow(charsetSize, pwd.length);
            const seconds = combinations / 10000000000 / 2; // 平均破解时间

            if (seconds < 1) return '瞬间';
            if (seconds < 60) return `${Math.floor(seconds)} 秒`;
            if (seconds < 3600) return `${Math.floor(seconds / 60)} 分钟`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)} 小时`;
            if (seconds < 31536000) return `${Math.floor(seconds / 86400)} 天`;
            if (seconds < 31536000 * 1000) return `${Math.floor(seconds / 31536000)} 年`;
            if (seconds < 31536000 * 1000000) return `${Math.floor(seconds / 31536000 / 1000)} 千年`;
            return '数百万年以上';
        }
    </script>
</body>
</html>
